name: Reusable IaC Persistent

on:
  workflow_call:
    inputs:
      apply:
        required: true
        type: boolean

jobs:
  plan-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_ARN }}
          aws-region: us-east-1

      - name: Bootstrap S3 tfstate backend
        uses: ./.github/actions/bootstrap-tfstate-s3
        with:
          bucket: ${{ vars.AWS_TF_STATE_BUCKET }}
          region: ${{ vars.AWS_TF_STATE_REGION }}

      - name: Terraform Init
        run: |
          terraform -chdir=iac/aws init \
            -backend-config="bucket=${{ vars.AWS_TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_TF_STATE_REGION }}"

      - name: Terraform Validate
        run: terraform -chdir=iac/aws validate

      - name: Terraform Plan
        env:
          TF_VAR_app_unique_id: ${{ vars.TF_VAR_app_unique_id }}
          TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
        run: |
          terraform -chdir=iac/aws plan -no-color -input=false 2>&1 | tee plan-output.txt
          {
            echo "### Terraform Plan"
            echo '```'
            cat plan-output.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        if: inputs.apply
        env:
          TF_VAR_app_unique_id: ${{ vars.TF_VAR_app_unique_id }}
          TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
        run: terraform -chdir=iac/aws apply -auto-approve -input=false
